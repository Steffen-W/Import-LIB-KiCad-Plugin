[mypy]
# Run with: mypy (from project root)
python_version = 3.9
files = plugins
# Add paths for submodule packages so mypy can find easyeda2kicad and kiutils
mypy_path = plugins/easyeda2kicad:plugins/kiutils/src

# Exclude submodules from type checking (but they remain importable)
exclude = (?x)(
    ^plugins/kiutils/.*
    | ^plugins/easyeda2kicad/.*
    | ^test/.*
    )

# Check untyped function bodies
check_untyped_defs = True

# Ignore missing imports for external libraries without stubs
[mypy-wx.*]
ignore_missing_imports = True

[mypy-pcbnew.*]
ignore_missing_imports = True

# Skip checking submodules entirely (don't follow imports into them)
[mypy-kiutils.*]
follow_imports = skip

[mypy-impart_easyeda]
ignore_missing_imports = True

# pcbnew subclassing (C-extension, no stubs)
[mypy-plugins]
disallow_subclassing_any = False

# Auto-generated file (wxFormBuilder) - do not edit manually
[mypy-plugins.impart_gui]
disallow_subclassing_any = False
disallow_untyped_defs = False
disallow_untyped_calls = False

# wx subclassing and wx.__init__ calls (wx has no type stubs)
[mypy-plugins.impart_action]
disallow_subclassing_any = False
disallow_untyped_calls = False