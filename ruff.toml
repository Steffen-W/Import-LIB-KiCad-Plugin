target-version = "py39"
line-length = 100

exclude = [
    "plugins/easyeda2kicad",
    "plugins/kiutils",
]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade (flags syntax that can be simplified for target-version)
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[lint.per-file-ignores]
"plugins/impart_gui.py" = ["E", "W", "F"]  # auto-generated by wxFormBuilder

[format]
quote-style = "double"
indent-style = "space"
